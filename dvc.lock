schema: '2.0'
stages:
  create-database:
    cmd: "uv run python -m pipelines.create_database --authored=data/authored --db=data/db\n"
    deps:
    - path: data/authored/claim.json
      hash: md5
      md5: 2b406ce5b0ba6ccaae301f5d650b0eb7
      size: 171
    - path: data/authored/comparison_set_link.json
      hash: md5
      md5: aeec1fde3dc88d66a2e62ce06cf60232
      size: 900
    - path: data/authored/entity.json
      hash: md5
      md5: 02400e07229c7b8885551443da06962e
      size: 1111
    outs:
    - path: data/db/claim.parquet
      hash: md5
      md5: cdb3b5620792a24926a4b69a6c1232a9
      size: 2074
    - path: data/db/comparison_set_link.parquet
      hash: md5
      md5: c5e58e5ffa7d144a922ae54c345e281f
      size: 1894
    - path: data/db/entity.parquet
      hash: md5
      md5: 81ddf0059b8230ec9cfdb8d2cd50b43c
      size: 2620
  run-assay@head-to-head-gpt5:
    cmd: "bash -lc \"set -euo pipefail; mkdir -p data/run-assay/head-to-head/gpt5;
      uv run python -m pipelines.run_assay --assay=head-to-head --model=gpt5 --db=data/db
      --save-path=data/assays/head-to-head/gpt5.parquet --exp=data/run-assay/head-to-head/gpt5/exp
      2>&1 | tee data/run-assay/head-to-head/gpt5/exec.log\"\n"
    deps:
    - path: data/db/claim.parquet
      hash: md5
      md5: cdb3b5620792a24926a4b69a6c1232a9
      size: 2074
    - path: data/db/comparison_set_link.parquet
      hash: md5
      md5: 1800d22e2f83d315eec02c4c66f1abfb
      size: 1768
    - path: data/db/entity.parquet
      hash: md5
      md5: 81ddf0059b8230ec9cfdb8d2cd50b43c
      size: 2620
    outs:
    - path: data/assays/head-to-head/gpt5.parquet
      hash: md5
      md5: d8c9592890d525f36f505434c1d1c95f
      size: 52622
  run-assay@head-to-head-gemini:
    cmd: "bash -lc \"set -euo pipefail; mkdir -p data/run-assay/head-to-head/gemini;
      uv run python -m pipelines.run_assay --assay=head-to-head --model=gemini --db=data/db
      --save-path=data/assays/head-to-head/gemini.parquet --exp=data/run-assay/head-to-head/gemini/exp
      2>&1 | tee data/run-assay/head-to-head/gemini/exec.log\"\n"
    deps:
