vars:
- pins-root: .dvc/pins
- data: data

stages:
  create-database:
    cmd: >
      uv run python -m pipelines.create_database
      --authored=${data}/authored
      --db=${data}/db
    deps:
    - ${data}/authored/claim.json
    - ${data}/authored/comparison_set_link.json
    - ${data}/authored/entity.json
    outs:
    - ${data}/db/claim.parquet:
        cache: false
    - ${data}/db/comparison_set_link.parquet:
        cache: false
    - ${data}/db/entity.parquet:
        cache: false