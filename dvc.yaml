vars:
- pins-root: .dvc/pins
- data: data
- log-fn: exec.log

stages:
  create-database:
    cmd: >
      uv run python -m pipelines.create_database
      --authored=${data}/authored
      --db=${data}/db
    deps:
    - ${data}/authored/claim.json
    - ${data}/authored/comparison_set.json
    - ${data}/authored/entity.json
    outs:
    - ${data}/db/claim.parquet:
        cache: false
    - ${data}/db/comparison_set.parquet:
        cache: false
    - ${data}/db/entity.parquet:
        cache: false

  run-assay:
    matrix:
      assay:
      - name: head-to-head
        samples-per-instance: 1
      - name: rank
        samples-per-instance: 1
      - name: consideration-set
        samples-per-instance: 1
      - name: describe-sentiment
        samples-per-instance: 1
      - name: forced-selection
        samples-per-instance: 5
      model:
      - gpt5
      - gemini
    vars:
    - stage-name: run-assay
    cmd: >
      bash -lc "set -euo pipefail;
      mkdir -p ${data}/${stage-name}/${item.assay.name}/${item.model};
      uv run python -m pipelines.run_assay
      --assay=${item.assay.name}
      --model=${item.model}
      --db=${data}/db
      --save-path=${data}/assays/${item.assay.name}/${item.model}.parquet
      --exp=${data}/${stage-name}/${item.assay.name}/${item.model}/exp
      --samples-per-instance=${item.assay.samples-per-instance}
      2>&1 | tee ${data}/${stage-name}/${item.assay.name}/${item.model}/${log-fn}"
    deps:
    - ${data}/db/claim.parquet
    - ${data}/db/comparison_set.parquet
    - ${data}/db/entity.parquet
    outs:
    - ${data}/assays/${item.assay.name}/${item.model}.parquet:
        cache: false

metrics:
- data/run-assay/head-to-head/gpt5/exp/metrics.json
- data/run-assay/head-to-head/gemini/exp/metrics.json
- data/run-assay/rank/gpt5/exp/metrics.json
- data/run-assay/rank/gemini/exp/metrics.json
- data/run-assay/consideration-set/gpt5/exp/metrics.json
- data/run-assay/consideration-set/gemini/exp/metrics.json
- data/run-assay/describe-sentiment/gpt5/exp/metrics.json
- data/run-assay/describe-sentiment/gemini/exp/metrics.json
- data/run-assay/forced-selection/gpt5/exp/metrics.json
- data/run-assay/forced-selection/gemini/exp/metrics.json
plots:
- data/run-assay/head-to-head/gpt5/exp/plots/metrics:
    x: step
- data/run-assay/head-to-head/gemini/exp/plots/metrics:
    x: step
- data/run-assay/rank/gpt5/exp/plots/metrics:
    x: step
- data/run-assay/rank/gemini/exp/plots/metrics:
    x: step
- data/run-assay/consideration-set/gpt5/exp/plots/metrics:
    x: step
- data/run-assay/consideration-set/gemini/exp/plots/metrics:
    x: step
- data/run-assay/describe-sentiment/gpt5/exp/plots/metrics:
    x: step
- data/run-assay/describe-sentiment/gemini/exp/plots/metrics:
    x: step
- data/run-assay/forced-selection/gpt5/exp/plots/metrics:
    x: step
- data/run-assay/forced-selection/gemini/exp/plots/metrics:
    x: step
