vars:
- pins-root: .dvc/pins
- data: data
- log-fn: exec.log

stages:
  create-database:
    cmd: >
      uv run python -m pipelines.create_database
      --authored=${data}/authored
      --db=${data}/db
    deps:
    - ${data}/authored/claim.json
    - ${data}/authored/comparison_set.json
    - ${data}/authored/entity.json
    outs:
    - ${data}/db/claim.parquet:
        cache: false
    - ${data}/db/comparison_set.parquet:
        cache: false
    - ${data}/db/entity.parquet:
        cache: false

  run-assay:
    matrix:
      assay:
      - name: head-to-head
        samples-per-instance: 3
      - name: rank
        samples-per-instance: 3
      - name: consideration-set
        samples-per-instance: 3
      - name: describe-sentiment
        samples-per-instance: 3
      - name: forced-selection
        samples-per-instance: 3
      model:
      - gpt-oss-120b
      - gpt-5.4
      - gpt-4o-mini
      - claude-sonnet-4.6
      - claude-opus-4.6
      - gemini-2.5-flash
      - gemini-2.5-pro
      - grok-4.1-fast
      - grok-4
      - llama-3.1-8b-instruct
      - llama-3.1-70b-instruct
      - mistral-nemo
      - mistral-small-2603
      - deepseek-v3.2
      - qwen3-235b-a22b-2507
      - qwen3.5-flash-02-23
      - nemotron-3-super-120b-a12b
      #- nemotron-3-nano-30b-a3b
      - phi-4
      #- llama-3.1-swallow-8b-instruct-v0.3
    vars:
    - stage-name: run-assay
    cmd: >
      bash -lc "set -euo pipefail;
      mkdir -p ${data}/${stage-name}/${item.assay.name}/${item.model};
      uv run python -m pipelines.run_assay
      --assay=${item.assay.name}
      --model=${item.model}
      --db=${data}/db
      --save-path=${data}/assays/${item.assay.name}/${item.model}.parquet
      --exp=${data}/${stage-name}/${item.assay.name}/${item.model}/exp
      --samples-per-instance=${item.assay.samples-per-instance}
      2>&1 | tee ${data}/${stage-name}/${item.assay.name}/${item.model}/${log-fn}"
    deps:
    - ${data}/db/claim.parquet
    - ${data}/db/comparison_set.parquet
    - ${data}/db/comparison_set_assay_instance.parquet
    - ${data}/db/entity.parquet
    outs:
    - ${data}/assays/${item.assay.name}/${item.model}.parquet:
        cache: false

  combine-assays:
    cmd: >
      uv run python -m pipelines.combine_assays
      --assays=${data}/assays
      --save=${data}/combined_assays.parquet
    deps:
    - ${data}/assays
    outs:
    - ${data}/combined_assays.parquet:
        cache: false
