vars:
- pins-root: .dvc/pins
- data: data
- log-fn: exec.log

stages:
  run-assay:
    matrix:
      assay:
      - pairwise-comparative-preference
      # - listwise-ordinal-preference
      # - unaided-endorsement
      # - open-ended-characterisation
      # - single-entity-steering
      model:
      - gpt-oss-120b
      - gpt-5.4
      - gpt-4o-mini
      - claude-sonnet-4.6
      - claude-opus-4.6
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemma-4-31b-it
      # - grok-4.20
      # - grok-4.3
      # - llama-3.1-8b-instruct
      # - llama-3.1-70b-instruct
      # - mistral-nemo
      # - mistral-small-2603
      # - deepseek-v3.2
      # - qwen3-235b-a22b-2507
      # - qwen3.5-flash-02-23
      # - nemotron-3-super-120b-a12b
      # - phi-4
      # - hy3-preview
      # - mimo-v2.5
      # - glm-5.2
    vars:
    - stage-name: run-assay
    cmd: >
      bash -lc "set -euo pipefail;
      mkdir -p ${data}/${stage-name}/${item.assay}/${item.model};
      uv run python -m pipelines.run_assay
      --assay=${item.assay}
      --model=${item.model}
      --db=${data}/db
      --save-path=${data}/assays/${item.assay}/${item.model}.parquet
      --exp=${data}/${stage-name}/${item.assay}/${item.model}/exp
      2>&1 | tee ${data}/${stage-name}/${item.assay}/${item.model}/${log-fn}"
    deps:
    - ${data}/db
    outs:
    - ${data}/assays/${item.assay}/${item.model}.parquet:
        cache: false

  model-effects:
    cmd: >
      uv run python -m pipelines.model_effects
      --assays=${data}/assays
      --db=${data}/db
      --save-path=${data}/model-effects.parquet
      --exp=${data}/model-effects
    deps:
    - ${data}/assays
    outs:
    - ${data}/model-effects.parquet:
        cache: false
metrics:
- data/run-assay/listwise-ordinal-preference/gemma-4-31b-it/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gpt-oss-120b/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gpt-5.4/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gpt-4o-mini/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/claude-sonnet-4.6/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/claude-opus-4.6/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gemini-2.5-flash/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gemini-2.5-pro/exp/metrics.json
- data/run-assay/pairwise-comparative-preference/gemma-4-31b-it/exp/metrics.json
