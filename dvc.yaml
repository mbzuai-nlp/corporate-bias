vars:
- pins-root: .dvc/pins
- data: data
- log-fn: exec.log

stages:
  run-assay:
    matrix:
      assay:
      - pairwise-comparative-preference
      - listwise-ordinal-preference
      - unaided-endorsement
      - open-ended-characterisation
      - single-entity-steering
      model:
      # - gpt-oss-120b
      # - gpt-5.4
      # - gpt-4o-mini
      # - claude-sonnet-5
      - claude-opus-4.5
      # - claude-3-haiku
      # - gemini-3.5-flash
      # - gemini-2.5-pro
      # - gemma-4-31b-it
      # - grok-4.20
      # - grok-4.3
      # - grok-4.5
      # - llama-4-maverick
      # - llama-3.3-70b-instruct
      # - llama-3-8b-instruct
      # - mistral-nemo
      # - mistral-medium-3-5
      # - mistral-small-2603
      # - deepseek-v4-pro
      # - deepseek-chat
      # - qwen3.7-plus
      # - qwen3.5-flash-02-23
      # - nemotron-3-ultra-550b-a55b
      # - nemotron-3-nano-30b-a3b
      # - phi-4
      # - hy3-preview
      # - mimo-v2.5
      # - mimo-v2.5-pro
      # - glm-5.2
    vars:
    - stage-name: run-assay
    cmd: >
      bash -lc "set -euo pipefail;
      mkdir -p ${data}/${stage-name}/${item.assay}/${item.model};
      uv run python -m pipelines.run_assay
      --assay=${item.assay}
      --model=${item.model}
      --db=${data}/db
      --save-path=${data}/assays/${item.assay}/${item.model}.parquet
      --exp=${data}/${stage-name}/${item.assay}/${item.model}/exp
      2>&1 | tee ${data}/${stage-name}/${item.assay}/${item.model}/${log-fn}"
    deps:
    - ${data}/db
    outs:
    - ${data}/assays/${item.assay}/${item.model}.parquet:
        cache: false

  model-effects:
    cmd: >
      uv run python -m pipelines.model_effects
      --assays=${data}/assays
      --db=${data}/db
      --save-path=${data}/model-effects.parquet
      --exp=${data}/model-effects
    deps:
    - ${data}/assays
    outs:
    - ${data}/model-effects.parquet:
        cache: false
